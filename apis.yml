apis:
  - aid: utm:eprints-oai
    name: UTM Institutional Repository (UTM-IR) OAI-PMH
    description: >-
      The Universiti Teknologi Malaysia Institutional Repository (UTM-IR) is
      built on EPrints and exposes an OAI-PMH 2.0 metadata harvesting endpoint
      at /cgi/oai2, as registered with ROAR, OpenDOAR, and Sherpa. It provides
      Dublin Core metadata for theses, dissertations, journal articles,
      conference papers, and other UTM research output. The endpoint is
      documented by open-access registries but was not reachable for live
      verification from this environment.
