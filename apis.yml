aid: utm
name: Universiti Teknologi Malaysia
description: >-
  Universiti Teknologi Malaysia (UTM) is a public research university in Johor
  Bahru and Kuala Lumpur, Malaysia, ranked #181 in the QS World University
  Rankings 2025. UTM operates a broad set of institutional web properties
  including its main portal (utm.my), the UTM Library, UTMDigital services, the
  myUTM single sign-on portal, and the UTM Institutional Repository (UTM-IR)
  running EPrints. UTM does not publish a dedicated public developer portal or
  documented REST APIs; the most machine-consumable public interface is the
  EPrints OAI-PMH metadata feed for its institutional repository.
